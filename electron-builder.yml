appId: com.diego.whatsapp-organizer
productName: WhatsApp Organizer
copyright: Copyright © 2026 Cho

directories:
  output: dist
  buildResources: assets

files:
  - src/**/*
  - clientes.empty.json
  - package.json
  - node_modules/**/*

extraResources:
  - from: clientes.empty.json
    to: clientes.json
  - from: chromium
    to: chromium

win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: WhatsApp Organizer
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerHeaderIcon: assets/icon.ico
  deleteAppDataOnUninstall: false